name: Fetch World Cup Results

on:
  schedule:
    # Every 30 minutes during World Cup match windows (14:00–04:00 UTC)
    - cron: '*/30 14-23 * * *'
    - cron: '*/30 0-4 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  fetch-results:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch results from ESPN
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, datetime, os

          ESPN_URL = 'https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?limit=100'

          # Groups we care about
          OUR_GROUPS = {'B', 'E', 'F', 'I', 'J'}

          # ESPN team name → our key
          ESPN_MAP = {
            'canada': 'Canada', 'switzerland': 'Switzerland',
            'bosnia and herzegovina': 'Bosnia', 'bosnia': 'Bosnia',
            'qatar': 'Qatar', 'germany': 'Germany',
            "côte d'ivoire": 'IvoryCoast', 'ivory coast': 'IvoryCoast',
            'ecuador': 'Ecuador', 'curaçao': 'Curacao', 'curacao': 'Curacao',
            'netherlands': 'Netherlands', 'japan': 'Japan',
            'sweden': 'Sweden', 'tunisia': 'Tunisia',
            'france': 'France', 'senegal': 'Senegal',
            'norway': 'Norway', 'iraq': 'Iraq',
            'argentina': 'Argentina', 'austria': 'Austria',
            'algeria': 'Algeria', 'jordan': 'Jordan',
          }

          # Team → group mapping
          TEAM_GROUP = {
            'Canada': 'B', 'Switzerland': 'B', 'Bosnia': 'B', 'Qatar': 'B',
            'Germany': 'E', 'IvoryCoast': 'E', 'Curacao': 'E', 'Ecuador': 'E',
            'Netherlands': 'F', 'Japan': 'F', 'Sweden': 'F', 'Tunisia': 'F',
            'France': 'I', 'Senegal': 'I', 'Norway': 'I', 'Iraq': 'I',
            'Argentina': 'J', 'Austria': 'J', 'Algeria': 'J', 'Jordan': 'J',
          }

          # Load existing results.json if it exists
          existing = {}
          if os.path.exists('results.json'):
            with open('results.json') as f:
              try:
                data = json.load(f)
                existing = {r['id']: r for r in data.get('results', [])}
              except:
                pass

          # Hardcoded known results as base (in case ESPN misses anything)
          hardcoded = [
            {'id':'k_B1','home':'Canada',      'away':'Bosnia',      'hg':1,'ag':1,'status':'FT','date':'2026-06-12'},
            {'id':'k_E1','home':'Germany',     'away':'Curacao',     'hg':7,'ag':1,'status':'FT','date':'2026-06-14'},
            {'id':'k_E2','home':'IvoryCoast',  'away':'Ecuador',     'hg':1,'ag':0,'status':'FT','date':'2026-06-14'},
            {'id':'k_F1','home':'Netherlands', 'away':'Japan',       'hg':2,'ag':2,'status':'FT','date':'2026-06-14'},
            {'id':'k_F2','home':'Sweden',      'away':'Tunisia',     'hg':5,'ag':1,'status':'FT','date':'2026-06-15'},
            {'id':'k_I1','home':'France',      'away':'Senegal',     'hg':3,'ag':1,'status':'FT','date':'2026-06-16'},
          ]

          merged = {r['id']: r for r in hardcoded}
          merged.update(existing)

          # Fetch from ESPN
          try:
            req = urllib.request.Request(ESPN_URL, headers={'User-Agent': 'Mozilla/5.0'})
            with urllib.request.urlopen(req, timeout=10) as resp:
              espn = json.loads(resp.read())

            for ev in espn.get('events', []):
              comp = ev.get('competitions', [{}])[0]
              competitors = comp.get('competitors', [])
              if len(competitors) < 2:
                continue

              home = next((c for c in competitors if c.get('homeAway') == 'home'), None)
              away = next((c for c in competitors if c.get('homeAway') == 'away'), None)
              if not home or not away:
                continue

              h_name = ESPN_MAP.get(home['team']['displayName'].lower())
              a_name = ESPN_MAP.get(away['team']['displayName'].lower())
              if not h_name or not a_name:
                continue

              group = TEAM_GROUP.get(h_name)
              if group not in OUR_GROUPS:
                continue

              status_type = ev.get('status', {}).get('type', {})
              completed = status_type.get('completed', False)
              state = status_type.get('state', 'pre')
              clock = ev.get('status', {}).get('displayClock', '0\'')
              period = ev.get('status', {}).get('period', 0)

              if state == 'pre':
                status = 'PRE'
              elif completed:
                status = 'FT'
              else:
                status = 'LIVE'

              rid = 'espn_' + ev['id']
              merged[rid] = {
                'id': rid,
                'home': h_name,
                'away': a_name,
                'hg': int(home.get('score', 0) or 0),
                'ag': int(away.get('score', 0) or 0),
                'status': status,
                'clock': clock,
                'period': period,
                'date': ev.get('date', '')[:10],
                'group': group,
              }

            print(f'ESPN fetch OK — {len(espn.get("events", []))} events')
          except Exception as e:
            print(f'ESPN fetch failed: {e}')

          # Write results.json
          results_list = sorted(merged.values(), key=lambda r: r.get('date', ''))
          output = {
            'updated': datetime.datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ'),
            'results': results_list,
          }
          with open('results.json', 'w') as f:
            json.dump(output, f, indent=2)

          ft = [r for r in results_list if r['status'] == 'FT']
          live = [r for r in results_list if r['status'] == 'LIVE']
          print(f'results.json written: {len(ft)} FT, {len(live)} LIVE, {len(results_list)} total')
          PYEOF

      - name: Commit results.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            LIVE=$(python3 -c "import json; d=json.load(open('results.json')); print(len([r for r in d['results'] if r['status']=='LIVE']))")
            FT=$(python3 -c "import json; d=json.load(open('results.json')); print(len([r for r in d['results'] if r['status']=='FT']))")
            git commit -m "⚽ Results update: ${FT} FT, ${LIVE} LIVE [$(date -u '+%H:%M UTC')]"
            git push
          fi
