name: Fetch World Cup Results

on:
  schedule:
    # Every 30 minutes during World Cup match windows (14:00–04:00 UTC)
    - cron: '*/30 14-23 * * *'
    - cron: '*/30 0-4 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  fetch-results:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch results from ESPN
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, datetime, os

          ESPN_URL = 'https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?limit=100'

          ESPN_MAP = {
            'mexico':'Mexico','south africa':'SouthAfrica','korea republic':'KoreaRepublic',
            'south korea':'KoreaRepublic','czechia':'Czechia','czech republic':'Czechia',
            'canada':'Canada','bosnia and herzegovina':'Bosnia','bosnia':'Bosnia',
            'qatar':'Qatar','switzerland':'Switzerland',
            'brazil':'Brazil','morocco':'Morocco','haiti':'Haiti','scotland':'Scotland',
            'usa':'USA','united states':'USA','paraguay':'Paraguay','australia':'Australia','turkey':'Turkey','turkiye':'Turkey',
            'germany':'Germany','curacao':'Curacao',
            "cote d'ivoire":'IvoryCoast','ivory coast':'IvoryCoast','ecuador':'Ecuador',
            'netherlands':'Netherlands','japan':'Japan','sweden':'Sweden','tunisia':'Tunisia',
            'belgium':'Belgium','egypt':'Egypt','iran':'Iran','new zealand':'NewZealand',
            'spain':'Spain','cape verde':'CapeVerde','cabo verde':'CapeVerde',
            'saudi arabia':'SaudiArabia','uruguay':'Uruguay',
            'france':'France','senegal':'Senegal','iraq':'Iraq','norway':'Norway',
            'argentina':'Argentina','algeria':'Algeria','austria':'Austria','jordan':'Jordan',
            'portugal':'Portugal','dr congo':'DRCongo','congo dr':'DRCongo',
            'uzbekistan':'Uzbekistan','colombia':'Colombia',
            'england':'England','croatia':'Croatia','ghana':'Ghana','panama':'Panama',
          }

          TEAM_GROUP = {
            'Mexico':'A','SouthAfrica':'A','KoreaRepublic':'A','Czechia':'A',
            'Canada':'B','Bosnia':'B','Qatar':'B','Switzerland':'B',
            'Brazil':'C','Morocco':'C','Haiti':'C','Scotland':'C',
            'USA':'D','Paraguay':'D','Australia':'D','Turkey':'D',
            'Germany':'E','Curacao':'E','IvoryCoast':'E','Ecuador':'E',
            'Netherlands':'F','Japan':'F','Sweden':'F','Tunisia':'F',
            'Belgium':'G','Egypt':'G','Iran':'G','NewZealand':'G',
            'Spain':'H','CapeVerde':'H','SaudiArabia':'H','Uruguay':'H',
            'France':'I','Senegal':'I','Iraq':'I','Norway':'I',
            'Argentina':'J','Algeria':'J','Austria':'J','Jordan':'J',
            'Portugal':'K','DRCongo':'K','Uzbekistan':'K','Colombia':'K',
            'England':'L','Croatia':'L','Ghana':'L','Panama':'L',
          }

          existing = {}
          if os.path.exists('results.json'):
            with open('results.json') as f:
              try:
                data = json.load(f)
                existing = {r['id']: r for r in data.get('results', [])}
              except:
                pass

          merged = dict(existing)

          try:
            req = urllib.request.Request(ESPN_URL, headers={'User-Agent': 'Mozilla/5.0'})
            with urllib.request.urlopen(req, timeout=15) as resp:
              espn = json.loads(resp.read())

            matched = 0
            skipped = []
            for ev in espn.get('events', []):
              comp = ev.get('competitions', [{}])[0]
              competitors = comp.get('competitors', [])
              if len(competitors) < 2:
                continue
              home = next((c for c in competitors if c.get('homeAway') == 'home'), None)
              away = next((c for c in competitors if c.get('homeAway') == 'away'), None)
              if not home or not away:
                continue

              h_disp = home['team']['displayName']
              a_disp = away['team']['displayName']
              h_name = ESPN_MAP.get(h_disp.lower())
              a_name = ESPN_MAP.get(a_disp.lower())

              if not h_name or not a_name:
                skipped.append(h_disp + ' vs ' + a_disp)
                continue

              group = TEAM_GROUP.get(h_name)
              if not group:
                continue

              status_type = ev.get('status', {}).get('type', {})
              completed = status_type.get('completed', False)
              state = status_type.get('state', 'pre')
              clock = ev.get('status', {}).get('displayClock', '0\'')
              period = ev.get('status', {}).get('period', 0)

              if state == 'pre':
                status = 'PRE'
              elif completed:
                status = 'FT'
              else:
                status = 'LIVE'

              rid = 'espn_' + ev['id']
              merged[rid] = {
                'id': rid, 'home': h_name, 'away': a_name,
                'hg': int(home.get('score', 0) or 0),
                'ag': int(away.get('score', 0) or 0),
                'status': status, 'clock': clock, 'period': period,
                'date': ev.get('date', '')[:10], 'group': group,
              }
              matched += 1

            print('ESPN fetch OK -- ' + str(len(espn.get('events', []))) + ' events, ' + str(matched) + ' matched')
            if skipped:
              print('Skipped: ' + str(skipped))
          except Exception as e:
            print('ESPN fetch failed: ' + str(e))

          by_fixture = {}
          for rid, r in merged.items():
            key = tuple(sorted([r['home'], r['away']])) + (r['date'],)
            if key not in by_fixture:
              by_fixture[key] = r
            else:
              existing_r = by_fixture[key]
              if rid.startswith('espn_') and r['status'] in ('FT','LIVE'):
                by_fixture[key] = r
              elif not existing_r['id'].startswith('espn_') and rid.startswith('espn_'):
                by_fixture[key] = r

          results_list = sorted(by_fixture.values(), key=lambda r: (r.get('date',''), r.get('group','')))

          output = {
            'updated': datetime.datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ'),
            'results': results_list,
          }
          with open('results.json', 'w') as f:
            json.dump(output, f, indent=2, ensure_ascii=False)

          ft = [r for r in results_list if r['status'] == 'FT']
          live = [r for r in results_list if r['status'] == 'LIVE']
          print('results.json written: ' + str(len(ft)) + ' FT, ' + str(len(live)) + ' LIVE, ' + str(len(results_list)) + ' total')
          PYEOF

      - name: Commit results.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            LIVE=$(python3 -c "import json; d=json.load(open('results.json')); print(len([r for r in d['results'] if r['status']=='LIVE']))")
            FT=$(python3 -c "import json; d=json.load(open('results.json')); print(len([r for r in d['results'] if r['status']=='FT']))")
            git commit -m "Results update: ${FT} FT, ${LIVE} LIVE [$(date -u '+%H:%M UTC')]"
            git push
          fi
